name: Publish GitHub Package

on:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: publish-github-package
    cancel-in-progress: false

jobs:
    publish:
        name: Publish
        runs-on: macos-latest
        timeout-minutes: 20

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1.3.14

            - name: Set up GitHub Packages registry
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 24
                  registry-url: https://npm.pkg.github.com
                  scope: "@emittance-inc"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Test
              run: bun test

            - name: Type-check
              run: bun run tsc:src

            - name: Build
              run: bun run build

            - name: Prepare internal package metadata
              id: package
              run: |
                  node <<'NODE'
                  const fs = require("node:fs");
                  const path = "dist/package.json";
                  const runNumber = process.env.GITHUB_RUN_NUMBER ?? "";
                  const sha = process.env.GITHUB_SHA ?? "";

                  if (!/^[1-9]\d*$/.test(runNumber)) {
                    throw new Error("GITHUB_RUN_NUMBER must be a positive integer");
                  }
                  if (!/^[0-9a-f]{40}$/i.test(sha)) {
                    throw new Error("GITHUB_SHA must be a full Git commit SHA");
                  }

                  const packageJson = JSON.parse(fs.readFileSync(path, "utf8"));
                  const versionMatch = /^(\d+\.\d+\.\d+)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.exec(
                    packageJson.version,
                  );
                  if (!versionMatch) {
                    throw new Error(`Upstream package version is not valid SemVer: ${packageJson.version}`);
                  }

                  const version = `${versionMatch[1]}-emittance.${runNumber}.g${sha.slice(0, 7).toLowerCase()}`;
                  packageJson.name = "@emittance-inc/legend-list";
                  packageJson.version = version;
                  packageJson.repository = {
                    type: "git",
                    url: "git+https://github.com/emittance-inc/legend-list.git",
                  };
                  packageJson.publishConfig = {
                    access: "restricted",
                    registry: "https://npm.pkg.github.com",
                  };

                  fs.writeFileSync(path, `${JSON.stringify(packageJson, null, 2)}\n`);
                  fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
                  console.log(`Prepared ${packageJson.name}@${version}`);
                  NODE

            - name: Verify package contents
              working-directory: dist
              run: npm pack --dry-run

            - name: Publish ${{ steps.package.outputs.version }} to GitHub Packages
              working-directory: dist
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm publish --tag internal --access restricted --registry https://npm.pkg.github.com
