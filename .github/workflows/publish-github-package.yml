name: Publish GitHub Package

on:
    workflow_dispatch:
        inputs:
            version:
                description: Internal package version, such as 3.3.2-emittance.1
                required: true
                default: 3.3.2-emittance.1
                type: string

permissions:
    contents: read
    packages: write

concurrency:
    group: publish-github-package
    cancel-in-progress: false

jobs:
    publish:
        name: Publish
        runs-on: macos-latest
        timeout-minutes: 20

        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1.3.14

            - name: Set up GitHub Packages registry
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 24
                  registry-url: https://npm.pkg.github.com
                  scope: "@emittance-inc"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Test
              run: bun test

            - name: Type-check
              run: bun run tsc:src

            - name: Build
              run: bun run build

            - name: Prepare internal package metadata
              env:
                  PACKAGE_VERSION: ${{ inputs.version }}
              run: |
                  node <<'NODE'
                  const fs = require("node:fs");
                  const path = "dist/package.json";
                  const version = process.env.PACKAGE_VERSION ?? "";

                  if (!/^\d+\.\d+\.\d+-emittance\.\d+$/.test(version)) {
                    throw new Error("Version must look like 3.3.2-emittance.1");
                  }

                  const packageJson = JSON.parse(fs.readFileSync(path, "utf8"));
                  packageJson.name = "@emittance-inc/legend-list";
                  packageJson.version = version;
                  packageJson.repository = {
                    type: "git",
                    url: "git+https://github.com/emittance-inc/legend-list.git",
                  };
                  packageJson.publishConfig = {
                    access: "restricted",
                    registry: "https://npm.pkg.github.com",
                  };

                  fs.writeFileSync(path, `${JSON.stringify(packageJson, null, 2)}\n`);
                  NODE

            - name: Verify package contents
              working-directory: dist
              run: npm pack --dry-run

            - name: Publish to GitHub Packages
              working-directory: dist
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm publish --tag internal --access restricted --registry https://npm.pkg.github.com
